<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>Warehouse Receiving</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      /* Japanese-minimal palette */
      --bg: #f7f6f3;           /* off-white, warm */
      --surface: #fcfbf8;
      --surface-2: #f1efea;
      --ink: #1a1917;           /* near-black, warm */
      --ink-2: #3a3835;
      --ink-3: #6b6863;
      --ink-4: #9a9791;
      --ink-5: #c5c2bc;
      --hair: #e6e3dc;          /* hairline */
      --hair-strong: #d4d0c7;
      --accent: #1a1917;        /* monochrome accent */
      --ok: #4a6b3f;
      --warn: #a87a2b;
      --err: #a8402b;
      --radius: 3px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: "tnum" 1, "ss01" 1;
    }
    button { font-family: inherit; font-size: inherit; color: inherit; }
    input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    /* Thin scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--ink-5); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    .num { font-variant-numeric: tabular-nums; }
    .mono { font-family: "SF Mono", "Menlo", "Consolas", ui-monospace, monospace; font-size: 12px; letter-spacing: -0.01em; }
    .hair { border-color: var(--hair); }

    /* Fade-in helper */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn .2s ease-out both; }

    /* Toast slide */
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .toast-in { animation: toastIn .18s ease-out both; }

    /* Modal */
    @keyframes modalIn { from { opacity: 0; transform: translateY(6px) scale(.99); } to { opacity: 1; transform: none; } }
    .modal-in { animation: modalIn .16s ease-out both; }

    /* Hide number input spinners */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Hairline divider between table rows, sharper */
    .t-row:not(:last-child) { border-bottom: 1px solid var(--hair); }

    /* subtle placeholder stripe */
    .ph-stripe {
      background: repeating-linear-gradient(45deg, var(--surface-2) 0 6px, transparent 6px 12px);
      border: 1px dashed var(--hair-strong);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="./src/icons.jsx"></script>
  <script type="text/babel" src="./src/ui.jsx"></script>
  <script type="text/babel" src="./src/data.jsx"></script>
  <script type="text/babel" src="./src/sidebar.jsx"></script>
  <script type="text/babel" src="./src/page_so_list.jsx"></script>
  <script type="text/babel" src="./src/page_so_detail.jsx"></script>
  <script type="text/babel" src="./src/page_board_detail.jsx"></script>
  <script type="text/babel" src="./src/page_dashboard.jsx"></script>
  <script type="text/babel" src="./src/page_vendors.jsx"></script>
  <script type="text/babel" src="./src/page_chipbrands.jsx"></script>
  <script type="text/babel" src="./src/tweaks.jsx"></script>
  <script type="text/babel" src="./src/app.jsx"></script>
</body>
</html>
